<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Robot Workspace AR</title>

<style>

body{
margin:0;
overflow:hidden;
}

#camera{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="ui">
Workspace radius:
<input id="radius" type="range" min="0.2" max="2" step="0.1" value="0.8">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>

</html>
